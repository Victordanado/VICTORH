<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Dark Interface</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="background-glow"></div>
    
    <main class="chat-container">
        <header>
            <h1>Nexus<span>AI</span></h1>
            <p>O futuro da escrita inteligente</p>
        </header>

        <div class="chat-window" id="chatWindow">
            <div class="message ai">
                Olá! Como posso transformar suas ideias em realidade hoje?
            </div>
        </div>

        <div class="input-area">
            <textarea id="userInput" placeholder="Digite sua ideia aqui..." rows="1"></textarea>
            <button id="sendBtn">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
            </button>
        </div>
    </main>

    <script>
        // Simulação básica de interação
        const btn = document.getElementById('sendBtn');
        const input = document.getElementById('userInput');
        const windowChat = document.getElementById('chatWindow');

        btn.onclick = () => {
            if(input.value.trim() !== "") {
                const msg = document.createElement('div');
                msg.className = 'message user';
                msg.innerText = input.value;
                windowChat.appendChild(msg);
                input.value = "";
                windowChat.scrollTop = windowChat.scrollHeight;
            }
        }
    </script>
</body>
</html>
