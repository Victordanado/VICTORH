<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Olá Mundo</title>
    <style>
        /* Resetando margens e padding */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* Corpo da página */
        body {
            font-family: 'Arial', sans-serif;
            background-color: #f7f7f7;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            flex-direction: column;
            text-align: center;
        }

        /* Estilo do título */
        h1 {
            font-size: 3rem;
            color: #ff6347; /* Tom de vermelho chamativo */
            margin-bottom: 20px;
            text-shadow: 2px 2px 8px rgba(0, 0, 0, 0.3);
        }

        /* Estilo da imagem */
        .imagem {
            width: 200px;
            height: 200px;
            border-radius: 50%;
            object-fit: cover;
            border: 5px solid #ff6347;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
            transition: transform 0.3s ease-in-out;
        }

        /* Efeito ao passar o mouse na imagem */
        .imagem:hover {
            transform: scale(1.1);
        }
    </style>
</head>
<body>
    <h1>Olá Mundo!</h1>
    <img src="https://via.placeholder.com/200" alt="Imagem Chamativa" class="imagem">
</body>
</html>
