<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus AI | Global Interface</title>
    
    <style>
        /* RESET E FONTES */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            /* Fundo com imagem do mundo/tecnologia */
            background: linear-gradient(rgba(0, 0, 0, 0.7), rgba(0, 0, 0, 0.7)), 
                        url('https://images.unsplash.com/photo-1451187580459-43490279c0fa?q=80&w=2072&auto=format&fit=crop') no-repeat center center fixed;
            background-size: cover;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            overflow: hidden;
        }

        /* ANIMAÇÃO DE FUNDO (PULSO) */
        body::before {
            content: "";
            position: absolute;
            width: 150%;
            height: 150%;
            background: radial-gradient(circle, rgba(0, 242, 255, 0.05) 0%, transparent 50%);
            animation: pulseBg 10s infinite alternate;
            z-index: 0;
        }

        @keyframes pulseBg {
            0% { transform: scale(1); opacity: 0.5; }
            100% { transform: scale(1.2); opacity: 1; }
        }

        /* PAINEL PRINCIPAL (GLASSMORPHISM) */
        .main-container {
            width: 90%;
            max-width: 1200px;
            height: 85vh;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 30px;
            display: grid;
            grid-template-columns: 280px 1fr;
            z-index: 1;
            box-shadow: 0 50px 100px rgba(0,0,0,0.5);
            overflow: hidden;
            animation: containerShow 1s ease-out;
        }

        @keyframes containerShow {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* BARRA LATERAL (MUNDO) */
        .sidebar {
            background: rgba(0, 0, 0, 0.3);
            border-right: 1px solid rgba(255, 255, 255, 0.05);
            padding: 30px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .sidebar h2 {
            font-size: 0.7rem;
            letter-spacing: 3px;
            color: #00f2ff;
            text-transform: uppercase;
        }

        .nav-item {
            padding: 12px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            font-size: 0.85rem;
            transition: 0.3s;
            cursor: pointer;
            border-left: 3px solid transparent;
        }

        .nav-item:hover {
            background: rgba(255, 255, 255, 0.1);
            border-left: 3px solid #00f2ff;
            padding-left: 20px;
        }

        /* ÁREA DO CHAT */
        .chat-section {
            display: flex;
            flex-direction: column;
            height: 100%;
        }

        .chat-header {
            padding: 25px 40px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .chat-header h1 {
            font-size: 1.2rem;
            font-weight: 300;
            letter-spacing: 2px;
        }

        .chat-header span { color: #00f2ff; font-weight: 800; }

        .chat-messages {
            flex: 1;
            padding: 40px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 25px;
        }

        /* BALÕES DE MENSAGEM */
        .bubble {
            padding: 18px 25px;
            border-radius: 20px;
            max-width: 70%;
            font-size: 0.95rem;
            line-height: 1.6;
            animation: messagePop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes messagePop {
            from { opacity: 0; transform: scale(0.9) translateY(20px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        .ai {
            background: rgba(255, 255, 255, 0.07);
            align-self: flex-start;
            border-bottom-left-radius: 4px;
        }

        .user {
            background: #00f2ff;
            color: #000;
            font-weight: 600;
            align-self: flex-end;
            border-bottom-right-radius: 4px;
            box-shadow: 0 10px 20px rgba(0, 242, 255, 0.2);
        }

        /* CAMPO DE ENTRADA */
        .input-area {
            padding: 30px 40px;
            background: rgba(0, 0, 0, 0.2);
            display: flex;
            gap: 15px;
        }

        input {
            flex: 1;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 18px 25px;
            border-radius: 15px;
            color: white;
            outline: none;
            transition: 0.3s;
        }

        input:focus {
            background: rgba(255, 255, 255, 0.1);
            border-color: #00f2ff;
        }

        button {
            background: #00f2ff;
            border: none;
            padding: 0 30px;
            border-radius: 15px;
            font-weight: 800;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(0, 242, 255, 0.4);
        }

        /* SCROLLBAR PERSONALIZADA */
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }
    </style>
</head>
<body>

    <div class="main-container">
        <aside class="sidebar">
            <h2>🌍 EXPLORAÇÃO MUNDIAL</h2>
           <div class="nav-item" onclick="window.location.href='https://conceito.de/satelite'" style="cursor: pointer;">
    Conectar satelite
</div>
            <div class="nav-item" onclick="window.location.href='https:://brasilescola.uol.com.br/geografia/o-planeta-terra.htm>"style="cursor: pointer;" Planeta Terra </div>
            <div class="nav-item">Redes Neurais</div>
            <div class="nav-item">Banco de Dados</div>
            
            <h2 style="margin-top: auto;">SISTEMA</h2>
            <div style="font-size: 0.7rem; color: #666;">V3.0.4 Online</div>
        </aside>

        <section class="chat-section">
            <div class="chat-header">
                <h1>NEXUS <span>GLOBAL</span></h1>
                <div style="display:flex; align-items:center; gap:10px; font-size: 0.7rem;">
                    <span style="color: #00ff88;">●</span> SERVIDOR ATIVO
                </div>
            </div>

            <div class="chat-messages" id="chat">
                <div class="bubble ai">
                    Bem-vindo à rede global. Estou pronto para processar qualquer informação do mundo real para você. O que deseja criar?
                </div>
            </div>

            <div class="input-area">
                <input type="text" id="userInput" placeholder="Digite sua mensagem ao mundo...">
                <button onclick="enviar()">ENVIAR</button>
            </div>
        </section>
    </div>

    <script>
        function enviar() {
            const input = document.getElementById('userInput');
            const chat = document.getElementById('chat');

            if (input.value.trim() !== "") {
                const uMsg = document.createElement('div');
                uMsg.className = 'bubble user';
                uMsg.textContent = input.value;
                chat.appendChild(uMsg);

                const prompt = input.value;
                input.value = "";

                // Scroll automático
                chat.scrollTop = chat.scrollHeight;

                // Resposta simulada
                setTimeout(() => {
                    const aMsg = document.createElement('div');
                    aMsg.className = 'bubble ai';
                    aMsg.textContent = "🌍 Processando dados globais sobre: '" + prompt + "'... A resposta está sendo gerada através dos servidores mundiais.";
                    chat.appendChild(aMsg);
                    chat.scrollTop = chat.scrollHeight;
                }, 700);
            }
        }

        document.getElementById('userInput').onkeypress = function(e) {
            if (e.keyCode == 13) enviar();
        }
    </script>
</body>
</html>
