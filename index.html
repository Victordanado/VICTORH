<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mandar Mensagem para o Universo</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #121212;
            color: #e0e0e0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            flex-direction: column;
            text-align: center;
        }

        h1 {
            color: #3498db;
            font-size: 3rem;
        }

        #messageBox {
            width: 80%;
            max-width: 500px;
            padding: 10px;
            margin-top: 20px;
            background-color: #333;
            border: 1px solid #444;
            border-radius: 5px;
            color: #fff;
            font-size: 1.2rem;
            height: 150px;
            resize: none;
        }

        #sendBtn {
            background-color: #3498db;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            margin-top: 20px;
            cursor: pointer;
            font-size: 1.2rem;
        }

        #sendBtn:hover {
            background-color: #2980b9;
        }

        #response {
            margin-top: 20px;
            font-size: 1.2rem;
            color: #3498db;
        }

        #imagesContainer {
            margin-top: 30px;
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
        }

        .image {
            width: 150px;
            height: 150px;
            margin: 10px;
            object-fit: cover;
            border-radius: 5px;
        }

        .image img {
            width: 100%;
            height: 100%;
            border-radius: 5px;
        }
    </style>
</head>
<body>
    <h1>Mandar Mensagem para o Universo</h1>
    <textarea id="messageBox" placeholder="Escreva sua mensagem..."></textarea>
    <button id="sendBtn" onclick="sendMessage()">Enviar Mensagem</button>

    <div id="response"></div>
    <div id="imagesContainer">
        <div class="image">
            <img src="https://via.placeholder.com/150?text=Mundo" alt="Mundo">
        </div>
        <div class="image">
            <img src="https://via.placeholder.com/150?text=Planeta" alt="Planeta">
        </div>
        <div class="image">
            <img src="https://via.placeholder.com/150?text=Estrela" alt="Estrela">
        </div>
        <div class="image">
            <img src="https://via.placeholder.com/150?text=Galáxia" alt="Galáxia">
        </div>
    </div>

    <script>
        const responses = [
            "Mensagem enviada!",
            "Seu pedido está a caminho do universo.",
            "A mensagem foi transmitida com sucesso.",
            "Comunicado enviado para os confins do cosmos.",
            "Mensagem recebida. O universo responde em breve.",
            "A mensagem foi transmitida para o infinito."
        ];

        function sendMessage() {
            const responseElement = document.getElementById('response');
            const randomResponse = responses[Math.floor(Math.random() * responses.length)];
            responseElement.textContent = randomResponse;
        }
    </script>
</body>
</html>
