<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Minimal Chat</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;700&display=swap" rel="stylesheet">
<style>
/* RESET */
* { margin:0; padding:0; box-sizing:border-box; font-family:'Inter',sans-serif; }

/* BODY */
body {
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:#f0f2f5;
  color:#111;
}

/* CONTAINER */
.container {
  width:400px;
  height:600px;
  display:flex;
  flex-direction:column;
  border-radius:20px;
  background: rgba(255,255,255,0.9);
  box-shadow: 0 8px 30px rgba(0,0,0,0.12);
  overflow:hidden;
}

/* HEADER */
.header {
  padding:20px;
  font-weight:700;
  font-size:18px;
  text-align:center;
  border-bottom:1px solid #e0e0e0;
}

/* CHAT BOX */
.chat-box {
  flex:1;
  padding:20px;
  overflow-y:auto;
  display:flex;
  flex-direction:column;
  gap:10px;
  background:#fff;
}

/* SCROLL */
.chat-box::-webkit-scrollbar { width:6px; }
.chat-box::-webkit-scrollbar-thumb { background:#ccc; border-radius:10px; }

/* MENSAGENS */
.message {
  padding:12px 18px;
  border-radius:15px;
  max-width:75%;
  font-size:14px;
  animation:fadeIn 0.2s ease;
}

.user { align-self:flex-end; background:#0072ff; color:#fff; }
.world { align-self:flex-start; background:#e5e5ea; color:#111; }

@keyframes fadeIn {
  from {opacity:0; transform:translateY(5px);}
  to {opacity:1; transform:translateY(0);}
}

/* INPUT AREA */
.input-area {
  display:flex;
  border-top:1px solid #e0e0e0;
  padding:15px;
  background:#fafafa;
}

input {
  flex:1;
  padding:12px 15px;
  border-radius:15px;
  border:1px solid #ccc;
  outline:none;
  font-size:14px;
  transition:0.2s;
}

input:focus { border-color:#0072ff; box-shadow:0 0 5px rgba(0,114,255,0.3); }

button {
  margin-left:10px;
  padding:12px 20px;
  border:none;
  border-radius:15px;
  background:#0072ff;
  color:#fff;
  cursor:pointer;
  font-weight:500;
  transition:0.2s;
}

button:hover { background:#005ec2; }
</style>
</head>
<body>

<div class="container">
  <div class="header">Minimal Chat</div>
  <div class="chat-box" id="chat"></div>
  <div class="input-area">
    <input type="text" id="input" placeholder="Digite sua mensagem...">
    <button onclick="send()">Enviar</button>
  </div>
</div>

<script>
const chat = document.getElementById("chat");
const input = document.getElementById("input");

let memoria = JSON.parse(localStorage.getItem("memoriaMinimal")) || [];

function salvarMemoria() {
  localStorage.setItem("memoriaMinimal", JSON.stringify(memoria));
}

function addMessage(text,type){
  const msg = document.createElement("div");
  msg.classList.add("message",type);
  msg.textContent=text;
  chat.appendChild(msg);
  chat.scrollTop=chat.scrollHeight;
}

function ai(text){
  text=text.toLowerCase();
  if(text.includes("oi")) return "Olá! 👋";
  if(text.includes("triste")) return "Tudo vai ficar bem 😌";
  if(text.includes("feliz")) return "Que bom! 😊";
  if(text.includes("amor")) return "O amor está no ar ❤️";
  return "Hmm, interessante...";
}

function send(){
  const texto=input.value.trim();
  if(!texto) return;
  addMessage(texto,"user");
  memoria.push({user:texto});
  input.value="";
  setTimeout(()=>{
    const resposta = ai(texto);
    addMessage(resposta,"world");
    memoria.push({world:resposta});
    salvarMemoria();
  },400);
}

input.addEventListener("keypress",e=>{
  if(e.key==="Enter") send();
});

// carregar histórico
memoria.forEach(item=>{
  if(item.user)addMessage(item.user,"user");
  if(item.world)addMessage(item.world,"world");
});
</script>

</body>
</html>
