<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Conversando com o Mundo</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    height: 100vh;
    font-family: 'Poppins', sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(-45deg, #0f2027, #203a43, #2c5364, #1c92d2);
    background-size: 400% 400%;
    animation: gradient 15s ease infinite;
}

@keyframes gradient {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
}

.container {
    width: 450px;
    height: 650px;
    background: rgba(255,255,255,0.1);
    backdrop-filter: blur(15px);
    border-radius: 25px;
    box-shadow: 0 20px 50px rgba(0,0,0,0.4);
    display: flex;
    flex-direction: column;
    overflow: hidden;
}

.header {
    padding: 20px;
    text-align: center;
    font-size: 22px;
    font-weight: 600;
    background: rgba(255,255,255,0.15);
    color: white;
}

.chat-box {
    flex: 1;
    padding: 20px;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 12px;
}

.message {
    padding: 12px 18px;
    border-radius: 20px;
    max-width: 75%;
    font-size: 14px;
    animation: fadeIn 0.3s ease;
}

.user {
    align-self: flex-end;
    background: linear-gradient(to right, #0072ff, #00c6ff);
    color: white;
}

.world {
    align-self: flex-start;
    background: rgba(255,255,255,0.2);
    color: white;
}

.input-area {
    display: flex;
    padding: 15px;
    background: rgba(255,255,255,0.15);
}

input {
    flex: 1;
    padding: 12px;
    border-radius: 25px;
    border: none;
    outline: none;
    font-size: 14px;
}

button {
    margin-left: 10px;
    padding: 12px 18px;
    border-radius: 25px;
    border: none;
    background: linear-gradient(to right, #00c6ff, #0072ff);
    color: white;
    cursor: pointer;
    font-weight: 500;
    transition: 0.3s;
}

button:hover {
    transform: scale(1.05);
}

@keyframes fadeIn {
    from { opacity: 0; transform: translateY(5px); }
    to { opacity: 1; transform: translateY(0); }
}
</style>
</head>

<body>

<div class="container">
    <div class="header">
        🌍 Conversando com o Mundo
    </div>

    <div class="chat-box" id="chat"></div>

    <div class="input-area">
        <input type="text" id="userInput" placeholder="Digite sua mensagem...">
        <button onclick="sendMessage()">Enviar</button>
    </div>
</div>

<script>
const chat = document.getElementById("chat");
const input = document.getElementById("userInput");

const respostas = {
    "oi": "🌍 Olá humano! É sempre bom conversar.",
    "como voce esta": "🌎 Estou girando tranquilamente pelo universo!",
    "triste": "🌏 Às vezes fico triste com o desmatamento... cuide de mim 💚",
    "feliz": "🌍 Que maravilha! Sua energia positiva me fortalece!",
    "quem e voce": "🌎 Eu sou o planeta Terra, sua casa."
};

function addMessage(text, className) {
    const msg = document.createElement("div");
    msg.classList.add("message", className);
    msg.textContent = text;
    chat.appendChild(msg);
    chat.scrollTop = chat.scrollHeight;
}

function sendMessage() {
    const userText = input.value.trim().toLowerCase();
    if(userText === "") return;

    addMessage(userText, "user");
    input.value = "";

    setTimeout(() => {
        let resposta = "🌍 Interessante... me conte mais.";

        for(let chave in respostas) {
            if(userText.includes(chave)) {
                resposta = respostas[chave];
                break;
            }
        }

        addMessage(resposta, "world");
    }, 800);
}

input.addEventListener("keypress", function(e){
    if(e.key === "Enter"){
        sendMessage();
    }
});
</script>

</body>
</html>
