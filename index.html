<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Conversando com o Mundo</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(-45deg, #0f2027, #203a43, #2c5364);
            background-size: 400% 400%;
            animation: gradient 12s ease infinite;
            color: white;
        }

        @keyframes gradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .card {
            background: rgba(255, 255, 255, 0.1);
            padding: 50px 70px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
            box-shadow: 0 15px 40px rgba(0,0,0,0.3);
            text-align: center;
            max-width: 400px;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 20px;
        }

        .chat {
            margin-top: 20px;
            min-height: 60px;
            font-weight: 300;
            opacity: 0;
            transition: opacity 0.5s ease;
        }

        .chat.show {
            opacity: 1;
        }

        button {
            margin-top: 25px;
            padding: 12px 25px;
            border: none;
            border-radius: 30px;
            background: #00c6ff;
            background: linear-gradient(to right, #0072ff, #00c6ff);
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s ease;
        }

        button:hover {
            transform: scale(1.1);
        }
    </style>
</head>
<body>

    <div class="card">
        <h1>Olá Mundo 🌍</h1>
        <p>Clique para conversar com o mundo</p>

        <button onclick="falarComMundo()">Falar</button>

        <div class="chat" id="resposta"></div>
    </div>

    <script>
        function falarComMundo() {
            const respostas = [
                "🌍 Mundo: Olá humano! Como você está?",
                "🌎 Mundo: Estou girando há bilhões de anos!",
                "🌏 Mundo: Cuide de mim 💚",
                "🌍 Mundo: Que bom falar com você!"
            ];

            const mensagem = respostas[Math.floor(Math.random() * respostas.length)];
            const chat = document.getElementById("resposta");

            chat.textContent = mensagem;
            chat.classList.add("show");
        }
    </script>

</body>
</html>
