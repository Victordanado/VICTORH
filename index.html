<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus AI | Interstellar</title>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        :root {
            --accent: #00f2ff;
            --bg-image: url('https://images.unsplash.com/photo-1451187580459-43490279c0fa?q=80&w=2072');
        }

        body {
            background-color: #000;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            overflow: hidden;
            transition: background 0.8s ease-in-out;
        }

        /* Camada de imagem de fundo com animação */
        .bg-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: var(--bg-image);
            background-size: cover;
            background-position: center;
            filter: brightness(0.4);
            z-index: -1;
            transition: all 1s ease;
            animation: slowZoom 20s infinite alternate;
        }

        @keyframes slowZoom {
            from { transform: scale(1); }
            to { transform: scale(1.1); }
        }

        .main-container {
            width: 95%;
            max-width: 1100px;
            height: 85vh;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 30px;
            display: grid;
            grid-template-columns: 260px 1fr;
            z-index: 1;
            box-shadow: 0 0 100px rgba(0,0,0,0.8);
            overflow: hidden;
            animation: slideUp 0.8s ease-out;
        }

        /* BARRA LATERAL */
        .sidebar {
            background: rgba(255, 255, 255, 0.03);
            border-right: 1px solid rgba(255, 255, 255, 0.05);
            padding: 30px 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .sidebar h2 {
            font-size: 0.7rem;
            letter-spacing: 3px;
            color: var(--accent);
            text-transform: uppercase;
            margin-bottom: 10px;
        }

        .nav-item {
            padding: 15px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            font-size: 0.9rem;
            transition: 0.4s;
            cursor: pointer;
            border: 1px solid transparent;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .nav-item:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: var(--accent);
            transform: translateX(10px);
        }

        .nav-item.active {
            background: rgba(0, 242, 255, 0.1);
            border-color: var(--accent);
            box-shadow: 0 0 15px rgba(0, 242, 255, 0.2);
        }

        /* ÁREA DE CHAT */
        .chat-section {
            display: flex;
            flex-direction: column;
        }

        .chat-header {
            padding: 25px 40px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            justify-content: space-between;
        }

        .chat-header h1 { font-size: 1.2rem; font-weight: 300; }
        .chat-header span { color: var(--accent); font-weight: 800; transition: 0.5s; }

        .chat-messages {
            flex: 1;
            padding: 30px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .bubble {
            padding: 15px 20px;
            border-radius: 18px;
            max-width: 80%;
            font-size: 0.95rem;
            animation: pop 0.3s ease-out;
        }

        .ai { background: rgba(255, 255, 255, 0.07); align-self: flex-start; }
        .user { background: var(--accent); color: #000; font-weight: 600; align-self: flex-end; transition: 0.5s; }

        /* INPUT AREA */
        .input-area {
            padding: 25px 40px;
            display: flex;
            gap: 15px;
        }

        input {
            flex: 1;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 15px;
            border-radius: 12px;
            color: white;
            outline: none;
        }

        button {
            background: var(--accent);
            border: none;
            padding: 0 25px;
            border-radius: 12px;
            font-weight: 800;
            cursor: pointer;
            transition: 0.3s;
        }

        @keyframes slideUp { from { opacity: 0; transform: translateY(40px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes pop { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }

        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); }
    </style>
</head>
<body>

    <div class="bg-overlay" id="bg"></div>

    <div class="main-container">
        <aside class="sidebar">
            <h2>SISTEMA SOLAR</h2>
            <div class="nav-item active" onclick="changePlanet('Terra', '#00f2ff', 'https://images.unsplash.com/photo-1451187580459-43490279c0fa?q=80&w=2072', this)">
                🌎 Terra
            </div>
            <div class="nav-item" onclick="changePlanet('Marte', '#ff4d4d', 'https://images.unsplash.com/photo-1614728894747-a83421e2b9c9?q=80&w=2000', this)">
                🔴 Marte
            </div>
            <div class="nav-item" onclick="changePlanet('Saturno', '#ffd966', 'https://images.unsplash.com/photo-1614732414444-096e5f1122d5?q=80&w=2000', this)">
                🪐 Saturno
            </div>
            <div class="nav-item" onclick="changePlanet('Netuno', '#4d94ff', 'https://images.unsplash.com/photo-1614314104104-48422e70338a?q=80&w=2000', this)">
                🔵 Netuno
            </div>
            
            <h2 style="margin-top: auto;">COORDENADAS</h2>
            <div id="planet-name" style="font-size: 0.8rem; opacity: 0.6;">Setor: Terra-01</div>
        </aside>

        <section class="chat-section">
            <div class="chat-header">
