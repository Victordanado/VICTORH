<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Olá, Mundo!</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background-color: #f8f9fa;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            flex-direction: column;
            padding: 20px;
        }

        h1 {
            color: #2e7d32;
            font-size: 4em;
            margin-bottom: 20px;
            text-align: center;
        }

        .container {
            background-color: #ffffff;
            border-radius: 15px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            padding: 40px;
            width: 100%;
            max-width: 800px;
            text-align: center;
        }

        .container p {
            font-size: 1.2em;
            color: #555555;
        }

        textarea {
            width: 100%;
            height: 150px;
            font-size: 1.2em;
            padding: 10px;
            border: 2px solid #2e7d32;
            border-radius: 10px;
            resize: none;
            margin-top: 20px;
        }

        button {
            background-color: #2e7d32;
            color: white;
            font-size: 1.5em;
            padding: 10px 20px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            margin-top: 20px;
            transition: background-color 0.3s;
        }

        button:hover {
            background-color: #388e3c;
        }
    </style>
</head>
<body>
    <h1>Olá, Mundo!</h1>
    <div class="container">
        <p>Digite algo abaixo e clique no botão para enviar sua mensagem!</p>
        <textarea placeholder="Escreva aqui..."></textarea>
        <br>
        <button onclick="alert('Mensagem enviada!')">Enviar Mensagem</button>
    </div>
</body>
</html>
