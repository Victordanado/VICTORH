<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus AI | Premium Dark</title>
    
    <style>
        /* RESET GERAL PARA GARANTIR O FUNDO PRETO */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, sans-serif;
        }

        body {
            background-color: #000000 !important; /* Força o preto */
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            overflow: hidden;
            position: relative;
        }

        /* EFEITOS DE LUZ NO FUNDO */
        .glow {
            position: absolute;
            width: 40vw;
            height: 40vw;
            background: radial-gradient(circle, rgba(0, 242, 255, 0.08) 0%, rgba(0,0,0,0) 70%);
            top: -10%;
            left: -10%;
            z-index: 0;
        }

        .glow-2 {
            position: absolute;
            width: 40vw;
            height: 40vw;
            background: radial-gradient(circle, rgba(124, 77, 255, 0.08) 0%, rgba(0,0,0,0) 70%);
            bottom: -10%;
            right: -10%;
            z-index: 0;
        }

        /* CONTAINER PRINCIPAL */
        .glass-panel {
            width: 90%;
            max-width: 1000px;
            height: 85vh;
            background: rgba(15, 15, 15, 0.7); /* Preto translúcido */
            backdrop-filter: blur(30px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            display: flex;
            flex-direction: column;
            z-index: 1;
            box-shadow: 0 0 40px rgba(0,0,0,0.5);
            overflow: hidden;
        }

        /* TOPO */
        .header {
            padding: 25px;
            text-align: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .header h1 {
            font-size: 1.2rem;
            letter-spacing: 6px;
            text-transform: uppercase;
            background: linear-gradient(to right, #00f2ff, #7c4dff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 800;
        }

        /* ÁREA DE CONVERSA */
        #chat-area {
            flex: 1;
            padding: 30px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .bubble {
            padding: 16px 20px;
            border-radius: 16px;
            max-width: 80%;
            font-size: 0.95rem;
            line-height: 1.5;
            animation: fadeIn 0.4s ease forwards;
        }

        .ai {
            background: rgba(255, 255, 255, 0.05);
            align-self: flex-start;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .user {
            background: linear-gradient(135deg, #00f2ff 0%, #0072ff 100%);
            color: #000;
            font-weight: 600;
            align-self: flex-end;
            box-shadow: 0 4px 15px rgba(0, 242, 255, 0.3);
        }

        /* BARRA DE DIGITAÇÃO */
        .input-box {
            padding: 25px;
            background: rgba(0, 0, 0, 0.4);
            display: flex;
            gap: 15px;
        }

        input {
            flex: 1;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 18px;
            border-radius: 14px;
            color: white;
            font-size: 1rem;
            outline: none;
            transition: 0.3s;
        }

        input:focus {
            border-color: #00f2ff;
            background: rgba(255, 255, 255, 0.08);
        }

        button {
            background: white;
            color: black;
            border: none;
            padding: 0 30px;
            border-radius: 14px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            transform: scale(1.05);
            background: #00f2ff;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* SCROLLBAR */
        #chat-area::-webkit-scrollbar { width: 4px; }
        #chat-area::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); }
    </style>
</head>
<body>

    <div class="glow"></div>
    <div class="glow-2"></div>

    <div class="glass-panel">
        <div class="header">
            <h1>Nexus IA Writing</h1>
        </div>

        <div id="chat-area">
            <div class="bubble ai">
                Sistema carregado. Estou pronto para criar com você. O que deseja escrever agora?
            </div>
        </div>

        <div class="input-box">
            <input type="text" id="prompt" placeholder="Digite seu comando aqui...">
            <button onclick="send()">ENVIAR</button>
        </div>
    </div>

    <script>
        function send() {
            const input = document.getElementById('prompt');
            const area = document.getElementById('chat-area');

            if (input.value.trim() !== "") {
                // Mensagem do Usuário
                const uMsg = document.createElement('div');
                uMsg.className = 'bubble user';
                uMsg.textContent = input.value;
                area.appendChild(uMsg);

                const val = input.value;
                input.value = "";

                // Resposta Automática da IA
                setTimeout(() => {
                    const aMsg = document.createElement('div');
                    aMsg.className = 'bubble ai';
                    aMsg.textContent = "Analisei seu pedido: '" + val + "'. Gerando conteúdo otimizado...";
                    area.appendChild(aMsg);
                    area.scrollTop = area.scrollHeight;
                }, 600);

                area.scrollTop = area.scrollHeight;
            }
        }

        // Detectar Tecla Enter
        document.getElementById('prompt').onkeypress = function(e) {
            if (e.keyCode == 13) send();
        }
    </script>
</body>
</html>
